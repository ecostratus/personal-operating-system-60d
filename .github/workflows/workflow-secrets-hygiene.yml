name: Workflow Secrets and Hygiene Test

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  workflow-secrets-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run workflow hygiene checks
        run: python3 scripts/ci/check_workflow_hygiene.py
