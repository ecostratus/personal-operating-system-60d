name: Active Layer Drift Check

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  active-layer-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.11'

      - name: Run active layer drift check
        run: python3 scripts/ci/check_active_layer_drift.py
